<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">

  <!-- Terminal window background -->
  <rect width="800" height="400" rx="10" ry="10" fill="#141527"/>

  <!-- Title bar (rounded top, flat bottom) -->
  <rect width="800" height="36" rx="10" ry="10" fill="#161722"/>
  <rect y="18" width="800" height="18" fill="#161722"/>

  <!-- Traffic light dots -->
  <circle cx="22" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="44" cy="18" r="6" fill="#febc2e"/>
  <circle cx="66" cy="18" r="6" fill="#28c840"/>

  <!-- Title bar text -->
  <text
    x="400" y="18"
    font-family="'Courier New', Courier, monospace"
    font-size="13"
    fill="#8b949e"
    text-anchor="middle"
    dominant-baseline="middle"
  >daniel@github — bash</text>

  <!-- Fetch command -->
  <text
    x="20" y="62"
    font-family="'Courier New', Courier, monospace"
    font-size="13"
    fill="#e5c07b"
  >❯ daniel --fetch</text>

  <!-- Left column: DM ASCII art -->
  <text xml:space="preserve" font-family="'Courier New', Courier, monospace" font-size="13" fill="#61afef">
    <tspan x="20" y="90"> ██████╗ ███╗   ███╗</tspan>
    <tspan x="20" dy="20"> ██╔══██╗████╗ ████║</tspan>
    <tspan x="20" dy="20"> ██║  ██║██╔████╔██║</tspan>
    <tspan x="20" dy="20"> ██║  ██║██║╚██╔╝██║</tspan>
    <tspan x="20" dy="20"> ██████╔╝██║ ╚═╝ ██║</tspan>
    <tspan x="20" dy="20"> ╚═════╝ ╚═╝     ╚═╝</tspan>
  </text>

  <!-- Right column: header -->
  <text x="230" y="90" font-family="'Courier New', Courier, monospace" font-size="13">
    <tspan fill="#61afef">daniel</tspan><tspan fill="#6b737e">@</tspan><tspan fill="#98c379">github</tspan>
  </text>

  <!-- Separator 1 -->
  <text x="230" y="110" font-family="'Courier New', Courier, monospace" font-size="13" fill="#30363d">────────────────────────────────────</text>

  <!-- Role -->
  <text x="230" y="130" font-family="'Courier New', Courier, monospace" font-size="13">
    <tspan fill="#98c379">Role     </tspan><tspan fill="#8b949e">: Full-Stack Developer</tspan>
  </text>

  <!-- Company -->
  <text x="230" y="150" font-family="'Courier New', Courier, monospace" font-size="13">
    <tspan fill="#98c379">Company  </tspan><tspan fill="#8b949e">: Widelab</tspan>
  </text>

  <!-- Mail -->
  <text x="230" y="170" font-family="'Courier New', Courier, monospace" font-size="13">
    <tspan fill="#98c379">Mail     </tspan><tspan fill="#8b949e">: danielpedro0m@gmail.com</tspan>
  </text>

  <!-- LinkedIn -->
  <text x="230" y="190" font-family="'Courier New', Courier, monospace" font-size="13">
    <tspan fill="#98c379">LinkedIn </tspan><tspan fill="#8b949e">: /in/daniel-medeiros</tspan>
  </text>

  <!-- Instagram -->
  <text x="230" y="210" font-family="'Courier New', Courier, monospace" font-size="13">
    <tspan fill="#98c379">Instagram</tspan><tspan fill="#8b949e">: @dp.medeiros</tspan>
  </text>

  <!-- Separator 2 -->
  <text x="230" y="230" font-family="'Courier New', Courier, monospace" font-size="13" fill="#30363d">────────────────────────────────────</text>

  <!-- Languages -->
  <text x="230" y="250" font-family="'Courier New', Courier, monospace" font-size="13">
    <tspan fill="#98c379">Languages</tspan><tspan fill="#8b949e">: JS · TS · Python · .NET</tspan>
  </text>

  <!-- Frontend -->
  <text x="230" y="270" font-family="'Courier New', Courier, monospace" font-size="13">
    <tspan fill="#98c379">Frontend </tspan><tspan fill="#8b949e">: React · Tailwind · MUI</tspan>
  </text>

  <!-- Backend -->
  <text x="230" y="290" font-family="'Courier New', Courier, monospace" font-size="13">
    <tspan fill="#98c379">Backend  </tspan><tspan fill="#8b949e">: Node · Express · MySQL</tspan>
  </text>

  <!-- Cloud -->
  <text x="230" y="310" font-family="'Courier New', Courier, monospace" font-size="13">
    <tspan fill="#98c379">Cloud    </tspan><tspan fill="#8b949e">: AWS · GCP</tspan>
  </text>

  <!-- Tools -->
  <text x="230" y="330" font-family="'Courier New', Courier, monospace" font-size="13">
    <tspan fill="#98c379">Tools    </tspan><tspan fill="#8b949e">: Git · Electron · Chart.js</tspan>
  </text>

  <!-- Separator 3 -->
  <text x="230" y="350" font-family="'Courier New', Courier, monospace" font-size="13" fill="#30363d">────────────────────────────────────</text>

  <!-- Color palette -->
  <rect x="230" y="361" width="20" height="13" rx="2" fill="#e06c75"/>
  <rect x="256" y="361" width="20" height="13" rx="2" fill="#e5c07b"/>
  <rect x="282" y="361" width="20" height="13" rx="2" fill="#98c379"/>
  <rect x="308" y="361" width="20" height="13" rx="2" fill="#56b6c2"/>
  <rect x="334" y="361" width="20" height="13" rx="2" fill="#61afef"/>
  <rect x="360" y="361" width="20" height="13" rx="2" fill="#c678dd"/>

</svg>
